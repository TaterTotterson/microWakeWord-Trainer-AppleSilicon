name: Build macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wakeword-trainer-macos-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: macOS app
    runs-on: [self-hosted, macOS]
    timeout-minutes: 60
    env:
      WAKEWORD_TRAINER_CODESIGN_IDENTITY: "${{ vars.WAKEWORD_TRAINER_CODESIGN_IDENTITY || 'Developer ID Application: Tater Totterson AI LLC (8BHV7Y2D9D)' }}"
      WAKEWORD_TRAINER_NOTARIZE: "${{ vars.WAKEWORD_TRAINER_NOTARIZE || '0' }}"
      WAKEWORD_TRAINER_NOTARY_PROFILE: "${{ vars.WAKEWORD_TRAINER_NOTARY_PROFILE || 'tater-notary' }}"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' macos/WakeWordTrainer/Resources/Info.plist)"
          expected_tag="v${version#v}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match macOS app version ${expected_tag}." >&2
            exit 1
          fi

      - name: Build updater package
        shell: bash
        run: macos/WakeWordTrainer/scripts/package_update.sh

      - name: Build installer DMG
        shell: bash
        run: macos/WakeWordTrainer/scripts/build_dmg.sh

      - name: Collect artifact metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' macos/WakeWordTrainer/Resources/Info.plist)"
          version_token="${version#v}"
          version_label="v${version_token}"
          zip_path="macos/WakeWordTrainer/releases/WakeWordTrainer-${version_label}.zip"
          dmg_path="macos/WakeWordTrainer/releases/WakeWordTrainer-${version_label}.dmg"
          test -f "${zip_path}"
          test -f "${dmg_path}"
          echo "version_label=${version_label}" >> "${GITHUB_OUTPUT}"
          echo "zip_path=${zip_path}" >> "${GITHUB_OUTPUT}"
          echo "dmg_path=${dmg_path}" >> "${GITHUB_OUTPUT}"
          echo "manifest_path=macos/WakeWordTrainer/update-manifest.json" >> "${GITHUB_OUTPUT}"
          shasum -a 256 "${zip_path}" "${dmg_path}" "macos/WakeWordTrainer/update-manifest.json"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WakeWordTrainer-macOS-${{ steps.meta.outputs.version_label }}
          if-no-files-found: error
          path: |
            ${{ steps.meta.outputs.zip_path }}
            ${{ steps.meta.outputs.dmg_path }}
            ${{ steps.meta.outputs.manifest_path }}

      - name: Commit updater files to main
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            echo "Tag commit is not current origin/main; skipping generated release commit." >&2
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            "${{ steps.meta.outputs.zip_path }}" \
            "${{ steps.meta.outputs.dmg_path }}" \
            "${{ steps.meta.outputs.manifest_path }}"
          if git diff --cached --quiet; then
            echo "No generated release changes to commit."
            exit 0
          fi
          git commit -m "Add WakeWord Trainer macOS release ${{ steps.meta.outputs.version_label }}"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Generated release commit push failed on attempt ${attempt}; retrying..." >&2
            sleep 10
          done
          echo "::warning::Generated release files were built, but pushing them to main timed out. Continuing so GitHub Release assets can publish."

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          VERSION_LABEL: ${{ steps.meta.outputs.version_label }}
          ZIP_PATH: ${{ steps.meta.outputs.zip_path }}
          DMG_PATH: ${{ steps.meta.outputs.dmg_path }}
          MANIFEST_PATH: ${{ steps.meta.outputs.manifest_path }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          tag="${GITHUB_REF_NAME}"
          api_url="https://api.github.com/repos/${repo}"
          upload_url="https://uploads.github.com/repos/${repo}"
          auth_header="Authorization: Bearer ${GITHUB_TOKEN}"
          api_headers=(
            -H "${auth_header}"
            -H "Accept: application/vnd.github+json"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )

          json_id() {
            /usr/bin/python3 -c 'import json, sys; print(json.load(sys.stdin).get("id", ""))' 2>/dev/null || true
          }

          release_id="$(curl -fsS "${api_headers[@]}" "${api_url}/releases/tags/${tag}" | json_id || true)"
          if [[ -z "${release_id}" ]]; then
            release_body="$(/usr/bin/python3 -c 'import json, os; print(json.dumps({
              "tag_name": os.environ["GITHUB_REF_NAME"],
              "name": "WakeWord Trainer " + os.environ["VERSION_LABEL"],
              "prerelease": True,
              "generate_release_notes": True,
            }))')"
            release_id="$(curl -fsS \
              -X POST \
              "${api_headers[@]}" \
              -H "Content-Type: application/json" \
              --data "${release_body}" \
              "${api_url}/releases" | json_id)"
          fi

          upload_asset() {
            local path="$1"
            local content_type="$2"
            local name
            local existing_id
            name="$(basename "${path}")"
            existing_id="$(curl -fsS "${api_headers[@]}" "${api_url}/releases/${release_id}/assets?per_page=100" \
              | /usr/bin/python3 -c 'import json, sys; target = sys.argv[1]; print(next((str(asset.get("id", "")) for asset in json.load(sys.stdin) if asset.get("name") == target), ""))' "${name}" 2>/dev/null || true)"
            if [[ -n "${existing_id}" ]]; then
              curl -fsS -X DELETE "${api_headers[@]}" "${api_url}/releases/assets/${existing_id}" >/dev/null
            fi
            curl -fsS \
              -X POST \
              "${api_headers[@]}" \
              -H "Content-Type: ${content_type}" \
              --data-binary @"${path}" \
              "${upload_url}/releases/${release_id}/assets?name=${name}" \
              | /usr/bin/python3 -c 'import json, sys; print("uploaded " + json.load(sys.stdin).get("name", ""))'
          }

          upload_asset "${ZIP_PATH}" "application/zip"
          upload_asset "${DMG_PATH}" "application/x-apple-diskimage"
          upload_asset "${MANIFEST_PATH}" "application/json"
